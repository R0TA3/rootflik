<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RootFlik Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #eaeded;
}

/* Navbar */
.navbar {
    background: #131921;
    color: white;
    padding: 15px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    font-size: 1.5rem;
    font-weight: bold;
}

.search-bar {
    flex: 1;
    margin: 0 20px;
}

.search-bar input {
    width: 100%;
    padding: 8px;
    border-radius: 4px;
    border: none;
}

.cart {
    font-weight: bold;
}

/* Banner */
.banner {
    background: linear-gradient(to right, #007185, #004f5f);
    color: white;
    text-align: center;
    padding: 50px 20px;
}

.banner h1 {
    margin: 0;
}

/* Product Grid */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 6px;
    text-align: center;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.price {
    color: #B12704;
    font-weight: bold;
    margin: 10px 0;
}

button {
    background: #FFD814;
    border: none;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background: #F7CA00;
}

footer {
    background: #131921;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">RootFlik Store</div>
    <div class="search-bar">
        <input type="text" placeholder="Search products...">
    </div>
    <div class="cart">Cart 🛒</div>
</div>

<div class="banner">
    <h1>Welcome to RootFlik Online Store</h1>
    <p>High Quality Tech & Security Products</p>
</div>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/250x180">
        <h3>Cyber Security Toolkit</h3>
        <div class="price">₹2,999</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x180">
        <h3>Cloud Server Package</h3>
        <div class="price">₹5,499</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x180">
        <h3>AI Automation Kit</h3>
        <div class="price">₹7,999</div>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x180">
        <h3>PenTest Lab Setup</h3>
        <div class="price">₹4,299</div>
        <button>Add to Cart</button>
    </div>

</div>

<footer>
© 2026 RootFlik Store | All Rights Reserved
</footer>

</body>
</html>
